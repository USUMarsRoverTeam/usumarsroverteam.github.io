site_name: USU Mars Rover Team Documentation
site_url: https://usumarsroverteam.github.io

theme:
  name: material
  favicon: assets/marsroverwhiteicon.png
  logo: assets/marsroverwhite.png
  font:
    text: Atkinson Hyperlegible
    code: JetBrains Mono
  palette:
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
  features:
    - navigation.instant
    - navigation.tabs
    - navigation.sections
    - navigation.collapse
    - navigation.indexes
    - navigation.top
extra_css:
  - stylesheets/extra.css

nav:
  - Home: index.md
  - System Overview:
      - sys-overview/index.md
      - Comms and Controls: sys-overview/comms-ctrls.md
      - Drive System: sys-overview/drive.md
      - Robotic Arm: sys-overview/arm.md
      - Science Module: sys-overview/sci.md
      - Autonomous Navigation: sys-overview/autonomous.md
  - Appendix:
      - appendix/index.md
      - Wiring Diagrams: appendix/wiring-diagrams.md
      - How-Tos: appendix/how-tos.md
  - Resources:
      - resources/index.md

markdown_extensions:
  - toc:
      permalink: true
